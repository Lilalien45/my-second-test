<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal ZIP Explorer</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #238636; --border: #30363d; --sidebar: #161b22; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        header { padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--sidebar); display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        .input-area { display: flex; gap: 8px; flex: 1; min-width: 300px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: #010409; color: white; outline: none; font-size: 14px; }
        
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; border: none; font-size: 13px; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-upload { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); }
        .btn-export { background: #1f6feb; color: white; display: none; margin-left: auto; }
        
        main { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
        @media (max-width: 768px) { main { flex-direction: column; } #sidebar { width: 100% !important; height: 30%; border-right: none !important; border-bottom: 1px solid var(--border); } }

        #sidebar { width: 320px; border-right: 1px solid var(--border); background: var(--sidebar); overflow-y: auto; padding: 10px; box-sizing: border-box; }
        #viewer { flex: 1; background: var(--bg); overflow-y: auto; position: relative; }
        
        pre { margin: 0; padding: 20px; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        
        .file-item { padding: 10px; cursor: pointer; border-radius: 4px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #21262d; }
        .file-item:hover { background: #1f242c; color: #58a6ff; }
        .file-item.active { background: #23863622; color: #fff; border-left: 4px solid var(--accent); }
        .empty-state { padding: 40px; text-align: center; color: #8b949e; }
        
        /* Hidden real file input */
        #file-picker { display: none; }
        body.is-snapshot .controls-ui { display: none !important; }
    </style>
</head>
<body>

<header id="app-header">
    <div class="controls-ui input-area">
        <input type="text" id="repo-url" placeholder="GitHub URL">
        <button class="btn btn-primary" onclick="loadFromGithub()">Load GitHub</button>
    </div>
    
    <div class="controls-ui">
        <input type="file" id="file-picker" accept=".zip" onchange="loadFromDevice(this)">
        <button class="btn btn-upload" onclick="document.getElementById('file-picker').click()">📂 Open Local ZIP</button>
    </div>

    <button id="export-btn" class="btn btn-export" onclick="exportStaticPage()">💾 Export Standalone HTML</button>
</header>

<main>
    <div id="sidebar">
        <div class="empty-state">No files loaded.<br><small>Upload a ZIP or enter a GitHub URL</small></div>
    </div>
    <div id="viewer">
        <pre id="code-content">Your code will appear here...</pre>
    </div>
</main>

<script>
    let zipDataBlob = null;
    let activeZipInstance = null;

    // 1. LOAD FROM GITHUB
    async function loadFromGithub() {
        const url = document.getElementById('repo-url').value.trim();
        if (!url) return alert("Please enter a GitHub URL");
        
        updateStatus("Downloading from GitHub...");
        try {
            const cleanUrl = url.replace(/\/$/, "");
            const zipUrl = `${cleanUrl}/archive/refs/heads/main.zip`;
            const proxyUrl = `https://api.allorigins.win{encodeURIComponent(zipUrl)}`;
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error("Fetch failed. Is the repo public?");
            processZip(await response.blob());
        } catch (e) {
            alert(e.message);
            updateStatus("Error loading GitHub repo.");
        }
    }

    // 2. LOAD FROM DEVICE (PC, Android, iPhone)
    function loadFromDevice(input) {
        if (input.files && input.files[0]) {
            processZip(input.files[0]);
        }
    }

    // 3. COMMON PROCESSING LOGIC
    async function processZip(blob) {
        zipDataBlob = blob;
        try {
            activeZipInstance = await JSZip.loadAsync(blob);
            renderFileTree();
            document.getElementById('export-btn').style.display = 'flex';
            document.getElementById('code-content').innerText = "Select a file to view its content.";
        } catch (e) {
            alert("Invalid ZIP file: " + e.message);
        }
    }

    function renderFileTree() {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '<div style="padding:5px; font-size:11px; color:#58a6ff; font-weight:bold;">EXPLORER</div>';

        activeZipInstance.forEach((path, file) => {
            if (!file.dir) {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `📄 ${path.split('/').pop()}<br><small style="font-size:10px; opacity:0.6">${path}</small>`;
                div.onclick = async () => {
                    const content = await file.async("string");
                    document.getElementById('code-content').textContent = content;
                    document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                };
                sidebar.appendChild(div);
            }
        });
    }

    function updateStatus(msg) {
        document.getElementById('sidebar').innerHTML = `<div class="empty-state">${msg}</div>`;
    }

    // 4. EXPORT LOGIC
    function exportStaticPage() {
        if (!zipDataBlob) return;
        const reader = new FileReader();
        reader.readAsDataURL(zipDataBlob);
        reader.onloadend = function() {
            const base64 = reader.result;
            const script = `
<script>
    window.addEventListener('DOMContentLoaded', async () => {
        document.body.classList.add('is-snapshot');
        const res = await fetch("${base64}");
        processZip(await res.blob());
    });
<\/script>`;
            const finalHtml = document.documentElement.outerHTML + script;
            const blob = new Blob([finalHtml], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "portable-repo-viewer.html";
            a.click();
        };
    }
</script>

</body>
</html>
