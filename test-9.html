<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full GitHub API Repository Loader</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0d1117;
    color:#c9d1d9;
    padding:20px;
}
input,button{
    margin:5px;
    padding:8px;
}
#fileList{
    max-height:350px;
    overflow:auto;
    border:1px solid #30363d;
    padding:10px;
    background:#161b22;
}
#status{
    margin-top:10px;
    color:#58a6ff;
}
</style>
</head>
<body>

<h2>GitHub API Repository Loader (Complete)</h2>

<input type="text" id="repoInput" placeholder="owner/repository">
<input type="text" id="branchInput" placeholder="branch (default main)">
<input type="password" id="tokenInput" placeholder="GitHub API Token (optional)">
<br>

<button onclick="loadRepo()">Load Repository</button>
<button onclick="selectAllFiles()">Select All</button>
<button onclick="restoreAllFiles()">Restore All</button>
<button onclick="openSelected()">Open Selected in about:blank</button>

<div id="status"></div>
<div id="fileList"></div>

<script>
let repoFiles = {};
let originalFileIndex = {};
let currentOwner = "";
let currentRepo = "";
let currentBranch = "main";
let token = "";

/* Load repository using GitHub REST API */
async function loadRepo(){
    const repoValue = document.getElementById("repoInput").value.trim();
    const branchValue = document.getElementById("branchInput").value.trim();
    token = document.getElementById("tokenInput").value.trim();
    const status = document.getElementById("status");

    if(!repoValue.includes("/")){
        alert("Use format: owner/repository");
        return;
    }

    [currentOwner, currentRepo] = repoValue.split("/");
    currentBranch = branchValue || "main";

    status.innerText = "Loading repository...";

    try{
        const headers = token ? { "Authorization": "Bearer " + token } : {};

        const branchRes = await fetch(
            `https://api.github.com/repos/${currentOwner}/${currentRepo}/branches/${currentBranch}`,
            { headers }
        );
        const branchData = await branchRes.json();
        const treeSha = branchData.commit.commit.tree.sha;

        const treeRes = await fetch(
            `https://api.github.com/repos/${currentOwner}/${currentRepo}/git/trees/${treeSha}?recursive=1`,
            { headers }
        );
        const treeData = await treeRes.json();

        repoFiles = {};
        originalFileIndex = {};

        const list = document.getElementById("fileList");
        list.innerHTML = "";

        treeData.tree.forEach(item=>{
            if(item.type === "blob"){
                repoFiles[item.path] = item;
                originalFileIndex[item.path] = item;

                const label = document.createElement("label");
                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.value = item.path;

                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(" " + item.path));
                list.appendChild(label);
                list.appendChild(document.createElement("br"));
            }
        });

        status.innerText = "Repository fully loaded.";
    }
    catch(e){
        status.innerText = "Failed to load repository (check name, branch, token, or rate limit).";
    }
}

/* Select all files */
function selectAllFiles(){
    document.querySelectorAll("#fileList input[type='checkbox']")
        .forEach(box => box.checked = true);
}

/* Restore full original file index */
function restoreAllFiles(){
    repoFiles = {...originalFileIndex};

    const list = document.getElementById("fileList");
    list.innerHTML = "";

    Object.keys(repoFiles).forEach(path=>{
        const label = document.createElement("label");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = path;

        label.appendChild(checkbox);
        label.appendChild(document.createTextNode(" " + path));
        list.appendChild(label);
        list.appendChild(document.createElement("br"));
    });
}

/* Fetch raw file contents */
async function fetchFileContent(path){
    const headers = token ? { "Authorization": "Bearer " + token } : {};
    const response = await fetch(
        `https://raw.githubusercontent.com/${currentOwner}/${currentRepo}/${currentBranch}/${path}`,
        { headers }
    );
    return await response.text();
}

/* Open selected files in about:blank */
async function openSelected(){
    const selected = document.querySelectorAll("#fileList input:checked");
    if(!selected.length){
        alert("Select at least one file.");
        return;
    }

    const newTab = window.open("about:blank","_blank");

    let htmlContent = "<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Loaded Repository</title></head><body>";

    for(let item of selected){
        const path = item.value;
        const content = await fetchFileContent(path);

        if(path.endsWith(".html")){
            htmlContent += content;
        }
        else if(path.endsWith(".css")){
            htmlContent += "<style>"+content+"</style>";
        }
        else if(path.endsWith(".js")){
            htmlContent += "<script>"+content+"<\/script>";
        }
        else{
            htmlContent += "<pre>"+content.replace(/</g,"&lt;")+"</pre>";
        }
    }

    htmlContent += "</body></html>";

    newTab.document.open();
    newTab.document.write(htmlContent);
    newTab.document.close();
}
</script>

</body>
</html>
